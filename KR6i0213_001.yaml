body:
  text: 吳月支國居士支謙譯聞如是一時佛在舍衛國祇樹給孤獨園時有梵志名曰耶句來詣佛所阿難白佛言有異學梵志今來在外欲咨所疑天尊曰現之梵志乃進稽首佛足天尊曰就座梵志就座須臾退坐曰吾聞佛道厥義弘深汪洋無涯靡不成就靡不度生巍巍堂堂猶星中月神智妙達衆聖中王諸天所不逮黎民所不聞願開盲冥釋其愚癡所事何師以致斯尊天尊歎曰快哉斯問開發大行吾前世師其名難數吾今自然神耀得道非有師也然有八師從明得之刑戮或為王法所見誅治滅及門族死入地獄燒煮搒掠萬毒皆更求死不得罪竟乃出或為餓鬼或為畜生屠割剝裂死輒更刃魂神展轉更相殘賊吾見殺者其罪如此不敢復殺是吾一師佛時頌曰殺者心不仁強弱相傷殘殺生當過生結積纍劫怨受罪短命死驚怖遭暴患吾用畏是故慈心伏魔宮佛言二謂盜竊強劫人財或為財主刀杖加刑應時瓦解或為王法收繫著獄拷掠榜笞五毒並至戮之都市宗門灰滅死入地獄以手捧火洋銅沃口求死不得罪竟乃出當為餓鬼意欲飲水水化為膿所欲食物物化成炭身常負重衆惱自隨或為畜生死輒更刃以肉供人償其宿債吾見盜者其罪如此不敢復盜是吾二師佛時頌曰盜者不與取劫竊人財寶亡者無多少忿恚懷憂惱死受六畜身償其宿債負吾用畏是故棄家行學道佛言三謂邪淫犯人婦女或為夫主邊人所知臨時得殃刀杖加刑或為王法收繫著獄酷毒掠治戮之都市死入地獄臥之鐵床或抱銅柱獄鬼然火以燒其身地獄罪畢當更畜生若復為人閨門淫亂違佛遠法不親賢衆常懷恐怖多危少安吾見是故不敢邪淫是吾三師佛時頌曰淫為不淨行迷惑失正道精神魂魄馳傷命而早夭受罪頑癡荒死復墮惡道吾用畏是故棄家樂林藪佛言四謂惡口兩舌妄言綺語譖入無罪謗毀三尊舌致捶杖亦致滅門死入地獄獄中鬼神拔出其舌以牛犁之洋銅灌口求死不得罪畢乃出當為畜生恆食草棘若後為人言不見信口中恆臭多逢譖謗罵詈之聲臥輒惡夢有口不能得含佛經之至味吾見是故不敢惡口是吾四師佛時頌曰欺者有四過讒侫傷良貞受罪癡聾盲蹇吃口臭腥癡狂不能言死入拔舌囹吾修四淨口自致八音聲佛言五謂嗜酒酒為毒氣主成諸惡王道毀仁澤滅臣慢上忠敬朽父失禮母失慈子凶逆孝道敗夫失信婦奢淫九族諍財産耗亡國危身無不由之酒之亂道三十有六吾見是故絶酒不飲是吾五師佛時頌曰醉者為不孝怨禍從內生迷惑清高士亂德敗淑貞吾故不飲酒慈心濟群生淨慧度八難自致覺道成佛言六謂年老夫老之為苦頭白齒落目視𥆨𥆨耳聽不聰盛去衰至皮緩面皺百節痛疼行步苦極坐起呻吟憂悲惱苦識神轉滅便旋即忘命日促盡言之流涕吾見無常災變如斯故行求道不欲更之是吾六師佛時頌曰吾念世無常人生要當老盛去日衰羸形枯而白首憂勞百病生坐起愁痛惱吾用畏是故棄家行學道佛言七謂病瘦肉盡骨立百節皆痛猶被杖楚四大進退手足不任氣力虛竭坐臥須人口燥脣燋筋斷鼻坼目不見色耳不聞音不淨流出身臥其上心懷苦惱言輒悲哀今覩世人年盛力壯華色暐曄福盡罪至無常百變吾覩斯患故行求道不欲更之是吾七師佛時頌曰念人衰老時百病同時生水消而火滅刀風解其形骨離筋脈絶大命要當傾吾用畏是故求道願不生佛言八謂人死四百四病同時俱作四大欲散魂神不安風去息絶火滅身冷風先火次魂靈去矣身體挺直無所復知旬日之間肉壞血流膖脹爛臭無一可取身中有蟲還食其肉筋脈爛盡骨節解散髑髏異處脊脅肩臂䏶脛足指各自異處飛鳥走獸競來食之天龍鬼神帝王人民貧富貴賤無免此患吾見斯變故行求道不欲更之是吾八師佛時頌曰我惟老病死三界之大患福盡而命終氣絶於黃泉身爛還為土魂魄隨因緣吾用畏是故學道升泥洹於是梵志聞佛所說心開意解即得道迹前受五戒為清信士不殺不盜不淫不欺奉孝不醉歡喜而去
